<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- HubSpot sprocket mark -->
  <g transform="translate(32,32)">
    <!-- Outer spokes -->
    <rect x="-3" y="-24" width="6" height="12" rx="2" fill="#FFFFFF"/>
    <rect x="-3" y="-24" width="6" height="12" rx="2" fill="#FFFFFF" transform="rotate(60)"/>
    <rect x="-3" y="-24" width="6" height="12" rx="2" fill="#FFFFFF" transform="rotate(120)"/>
    <rect x="-3" y="-24" width="6" height="12" rx="2" fill="#FFFFFF" transform="rotate(180)"/>
    <rect x="-3" y="-24" width="6" height="12" rx="2" fill="#FFFFFF" transform="rotate(240)"/>
    <rect x="-3" y="-24" width="6" height="12" rx="2" fill="#FFFFFF" transform="rotate(300)"/>
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="17" stroke="#FFFFFF" stroke-width="5" fill="none"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="7" fill="#FFFFFF"/>
    <!-- Handle -->
    <line x1="22" y1="8" x2="28" y2="8" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <circle cx="29" cy="8" r="5" stroke="#FFFFFF" stroke-width="3" fill="none"/>
  </g>
</svg>
