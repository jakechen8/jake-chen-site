<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- HubSpot sprocket icon - accurate to the actual logo -->
  <g transform="translate(50, 50)">
    <!-- Center hub -->
    <circle cx="0" cy="0" r="12" fill="#FF7A59"/>
    <!-- Center hole -->
    <circle cx="0" cy="0" r="5" fill="white"/>
    <!-- 6 spokes + nodes -->
    <line x1="0" y1="-12" x2="0" y2="-28" stroke="#FF7A59" stroke-width="7" stroke-linecap="round"/>
    <circle cx="0" cy="-32" r="7" fill="#FF7A59"/>
    <line x1="10" y1="-6" x2="24" y2="-16" stroke="#FF7A59" stroke-width="7" stroke-linecap="round"/>
    <circle cx="28" cy="-19" r="7" fill="#FF7A59"/>
    <line x1="10" y1="6" x2="24" y2="16" stroke="#FF7A59" stroke-width="7" stroke-linecap="round"/>
    <circle cx="28" cy="19" r="7" fill="#FF7A59"/>
    <line x1="0" y1="12" x2="0" y2="28" stroke="#FF7A59" stroke-width="7" stroke-linecap="round"/>
    <circle cx="0" cy="32" r="7" fill="#FF7A59"/>
    <line x1="-10" y1="6" x2="-24" y2="16" stroke="#FF7A59" stroke-width="7" stroke-linecap="round"/>
    <circle cx="-28" cy="19" r="7" fill="#FF7A59"/>
    <line x1="-10" y1="-6" x2="-24" y2="-16" stroke="#FF7A59" stroke-width="7" stroke-linecap="round"/>
    <circle cx="-28" cy="-19" r="7" fill="#FF7A59"/>
  </g>
</svg>
